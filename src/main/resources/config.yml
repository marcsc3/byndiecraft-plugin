# Byndiecraft Configuration
# For hackathon setup guide, see README.md

jira:
  # Your Jira instance URL
  url: "https://bynder.atlassian.net"

  # Your Jira email address
  email: "your-email@bynder.com"

  # API token (can also be set via JIRA_API_TOKEN environment variable)
  # Generate at: https://id.atlassian.com/manage-profile/security/api-tokens
  api_token: "${JIRA_API_TOKEN}"

  # Project key for your Jira board
  project_key: "SHARE"

board:
  # Minecraft world name where the board is located
  world: "world"

  # Fixed anchor point where the board spawns (top-left corner)
  # If not set, /jiraboard spawn uses the player's current location
  anchor:
    x: 100
    y: 100
    z: 200

  # Status columns configuration
  # "name" is displayed on the Minecraft sign; "jira_status_name" must match the API status
  columns:
    - name: "Ready to be Picked Up"
      jira_status_name: "Backlog"
      frames: []

    - name: "In Progress"
      jira_status_name: "In Progress"
      frames: []

    - name: "Review"
      jira_status_name: "Code review"
      frames: []

    - name: "Merge"
      jira_status_name: "Closed"
      frames: []

    - name: "Done"
      jira_status_name: "Done"
      frames: []

# Phase 2: AI-Powered Ticket Implementation
ai:
  enabled: true

  # AI Chest location (set via /jiraboard setaichest command)
  chest_location:
    world: "world"
    x: 0
    y: 0
    z: 0

  # MCP Server endpoint
  mcp_endpoint: "http://localhost:3000/implement-ticket"

  # AWS Bedrock integration
  bedrock:
    # AWS credentials - using Bynder's AWS profile
    aws_profile: "development"
    region: "eu-central-1"

    # Model configuration - using Bynder's Claude Sonnet 4.5 inference profile
    model_id: "arn:aws:bedrock:eu-central-1:745091492598:application-inference-profile/ltk3rb6ikzf9"
    max_tokens: 8000

  # GitHub configuration
  github:
    # Authentication: use gh CLI (run "gh auth login" once)
    # No token needed when using gh CLI!
    default_owner: "bynder"
    default_repo: "byndiecraft-plugin"

    # Repo determination strategy
    auto_detect: true  # Let Claude decide from ticket

  # Visual feedback
  visual_effects: true
  return_book_on_completion: true
  add_pr_link_to_book_lore: true

# Debug mode - set to true for verbose logging
debug: true
